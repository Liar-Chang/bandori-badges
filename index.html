/* ── Excel 輸出 ── */
function doExportXlsx(list, title, btn, progWrap, prog){
  const fields = getExportFields().filter(f=>selectedFields.has(f.key));
  const headers = fields.map(f=>f.label);
  const rows = list.map(b=>{
    return fields.map(f=>{
      let val = b[f.key]||'';
      if(f.key==='event') val = b.short_event||getEventShortName(val)||val;
      return val;
    });
  });
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  // 設定欄寬
  ws['!cols'] = fields.map(f=>({wch: f.key==='event'?40:f.key==='band'?15:20}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, title.slice(0,30));
  XLSX.writeFile(wb, `bandori-badges-${Date.now()}.xlsx`);
  prog.style.width='100%';
  setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇ 下載'; progWrap.style.display='none'; prog.style.width='0%'; },600);
}

/* ── HTML 輸出 ── */
function doExportHtml(list, title, btn, progWrap, prog){
  const fields = getExportFields().filter(f=>selectedFields.has(f.key));
  const c = bandColor;
  const rows = list.map(b=>{
    const imgSrc = IMG_BASE_URL + b.id + '.' + (b.ext||'jpg');
    const cells = fields.map(f=>{
      let val = b[f.key]||'—';
      if(f.key==='event') val = b.short_event||getEventShortName(val)||val;
      if(f.key==='band'){
        const bc=bandColor(b.band);
        return `<td><span style="background:${bc}22;color:${bc};padding:2px 8px;border-radius:8px;font-size:0.85em;">${val}</span></td>`;
      }
      return `<td>${val}</td>`;
    }).join('');
    return `<tr><td><img src="${imgSrc}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'"/></td>${cells}</tr>`;
  }).join('');

  const htmlContent = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<title>${title}</title>
<style>
body{font-family:'Noto Sans TC',sans-serif;background:#faf9f5;padding:2rem;}
h1{color:#13122b;margin-bottom:1rem;}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px #0001;}
th{background:#f0eff9;color:#3d3d8f;padding:10px 14px;text-align:left;font-size:0.85rem;}
td{padding:8px 14px;border-top:1px solid #ece9e0;vertical-align:middle;font-size:0.9rem;}
tr:hover td{background:#fafaf8;}
footer{margin-top:1rem;font-size:0.75rem;color:#aaa;text-align:center;}
</style>
</head>
<body>
<h1>${title}（共 ${list.length} 枚）</h1>
<table>
<thead><tr><th>圖片</th>${fields.map(f=>`<th>${f.label}</th>`).join('')}</tr></thead>
<tbody>${rows}</tbody>
</table>
<footer>作者：千早愛音的暴躁柯基</footer>
</body>
</html>`;

  const blob = new Blob([htmlContent], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bandori-badges-${Date.now()}.html`;
  a.click(); URL.revokeObjectURL(url);
  prog.style.width='100%';
  setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇ 下載'; progWrap.style.display='none'; prog.style.width='0%'; },600);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.site-header{
  background:linear-gradient(135deg,#ff6eb4 0%,#ff2d78 40%,#c0005a 100%);
  color:#fff;
  padding:2rem 2rem 1.75rem;text-align:center;position:relative;overflow:hidden;
}
.site-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 30%,#ffffff30 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,#ff9ed044 0%,transparent 50%);
  pointer-events:none;
}

.header-inner{position:relative;z-index:1;}
.site-logo{font-size:clamp(2rem,5vw,3.2rem);font-weight:400;letter-spacing:0.02em;
  background:linear-gradient(90deg,#fff 0%,#ffe0ee 50%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(2px 2px 0px #c0005a);line-height:1.2;}



.layout{display:flex;min-height:calc(100vh - 160px);}
@media(max-width:800px){.layout{flex-direction:column;}}

.sidebar{background:#fff;border-right:1px solid var(--border);padding:1.5rem 1.25rem;
  position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;width:320px;min-width:240px;max-width:600px;}
@media(max-width:800px){.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);width:100%!important;}}

.resize-handle{width:5px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background 0.15s;position:relative;z-index:10;}
.resize-handle:hover,.resize-handle.dragging{background:#c0bef0;}

.main-wrap{flex:1;min-width:0;}

.sidebar-section{margin-bottom:1.5rem;}
.sidebar-section h3{font-size:0.72rem;font-weight:700;color:var(--muted);letter-spacing:0.08em;
  text-transform:uppercase;margin-bottom:0.75rem;}

.search-box{width:100%;padding:0.6rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:0.875rem;background:var(--bg);outline:none;transition:border 0.15s;}
.search-box:focus{border-color:#5a4fcf;}

.band-list{display:flex;flex-direction:column;gap:0.35rem;}
.band-chip{display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.75rem;border-radius:8px;
  cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;font-size:0.85rem;user-select:none;}
.band-chip:hover{background:#f5f4f0;}
.band-chip.active{border-color:var(--chip-color);background:var(--chip-bg);font-weight:600;}
.band-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.band-chip-count{margin-left:auto;font-size:0.75rem;opacity:0.5;}

.filter-group{display:flex;flex-direction:column;gap:0.3rem;max-height:160px;overflow-y:auto;}
.filter-item{display:flex;align-items:center;gap:0.6rem;cursor:pointer;font-size:0.83rem;padding:0.2rem 0;}
.filter-item input{width:15px;height:15px;accent-color:#5a4fcf;cursor:pointer;flex-shrink:0;}

.btn-reset{font-family:inherit;font-size:0.8rem;padding:0.45rem 1rem;border-radius:7px;
  background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all 0.15s;width:100%;}
.btn-reset:hover{border-color:#5a4fcf;color:#5a4fcf;}

.main{padding:1.5rem;}
.result-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem;}
.result-count{font-size:0.875rem;color:var(--muted);}
.sort-select{font-family:inherit;font-size:0.85rem;padding:0.4rem 0.75rem;border:1px solid var(--border);
  border-radius:7px;background:#fff;outline:none;cursor:pointer;}

.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:1rem;}

.badge-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);
  overflow:hidden;cursor:pointer;transition:all 0.2s;}
.badge-card:hover{border-color:#b8b0e8;box-shadow:0 4px 20px #5a4fcf15;transform:translateY(-2px);}

.badge-img-wrap{aspect-ratio:1;background:#f5f4f0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.badge-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.25s;}
.badge-img-wrap img.non-round{object-fit:contain;padding:6px;}
.badge-card:hover .badge-img-wrap img{transform:scale(1.05);}
.no-img{font-size:2.5rem;opacity:0.25;}

.badge-info{padding:0.7rem 0.75rem 0.8rem;}
.badge-char{font-size:0.875rem;font-weight:700;line-height:1.3;margin-bottom:0.3rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge-band-tag{display:inline-block;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:10px;font-weight:500;}
.badge-series{font-size:0.7rem;color:var(--muted);margin-top:0.3rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.detail-overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:center;
  justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.detail-overlay.active{opacity:1;pointer-events:all;}
.detail-modal{background:#fff;border-radius:20px;width:min(460px,95vw);max-height:90vh;
  overflow-y:auto;transition:transform 0.2s;transform:scale(0.95);}
.detail-overlay.active .detail-modal{transform:scale(1);}
.detail-img-wrap{position:relative;}
.detail-img{width:100%;aspect-ratio:1;object-fit:cover;background:#f5f4f0;display:block;}
.detail-img.non-round{object-fit:contain;padding:12px;}
.detail-close{position:absolute;top:0.75rem;right:0.75rem;width:34px;height:34px;border-radius:50%;
  background:#0005;border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-body{padding:1.5rem;}
.detail-band-tag{display:inline-block;padding:0.3rem 0.85rem;border-radius:20px;font-size:0.8rem;font-weight:700;margin-bottom:0.75rem;}
.detail-char{font-size:1.4rem;font-weight:900;margin-bottom:0.2rem;}
.detail-id{font-size:0.8rem;color:var(--muted);margin-bottom:1rem;}
.detail-fields{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.detail-field label{font-size:0.7rem;font-weight:600;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:0.2rem;}
.detail-field span{font-size:0.9rem;}
.detail-note{margin-top:1rem;padding:0.75rem;background:#f5f4f0;border-radius:8px;font-size:0.85rem;color:#555;}

.empty-main{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}

/* 展開卡片 */
.badge-card.expanded{grid-column:span 2;border-color:#b8b0e8;box-shadow:0 4px 20px #5a4fcf20;}
.badge-card-expand{display:none;padding:0.75rem 0.85rem 0.85rem;border-top:1px solid var(--border);animation:fadeIn 0.2s ease;}
.badge-card.expanded .badge-card-expand{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.expand-field{display:flex;flex-direction:column;gap:0.15rem;margin-bottom:0.55rem;}
.expand-field:last-child{margin-bottom:0;}
.expand-label{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.expand-value{font-size:0.82rem;color:var(--text);line-height:1.4;}
.expand-link{color:#5a4fcf;text-decoration:none;font-size:0.82rem;}
.expand-link:hover{text-decoration:underline;}
[data-theme="dark"] .badge-card-expand{border-color:#2e2e2e;}
[data-theme="dark"] .expand-value{color:var(--text);}

/* View toggle */
.view-toggle{display:flex;gap:0.5rem;}
.btn-view{font-family:inherit;font-size:0.82rem;padding:0.4rem 0.9rem;border-radius:7px;
  border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--muted);transition:all 0.15s;display:flex;align-items:center;gap:0.4rem;}
.btn-view.active{background:#13122b;color:#fff;border-color:#13122b;}
.btn-view:not(.active):hover{border-color:#5a4fcf;color:#5a4fcf;}

/* Table view */
.table-view-wrap{overflow-x:auto;}
.badge-table{width:100%;border-collapse:collapse;font-size:0.85rem;background:#fff;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--border);}
.badge-table thead{background:#f0eff9;}
.badge-table th{padding:0.75rem 1rem;text-align:left;font-weight:600;color:#3d3d8f;white-space:nowrap;font-size:0.78rem;letter-spacing:0.04em;text-transform:uppercase;}
.badge-table td{padding:0.6rem 1rem;border-top:1px solid var(--border);vertical-align:middle;}
.badge-table tr:hover td{background:#fafaf8;cursor:pointer;}
.tbl-thumb{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border);background:#f5f5f5;display:block;}
.tbl-band-tag{display:inline-block;padding:0.15rem 0.55rem;border-radius:10px;font-size:0.72rem;font-weight:600;white-space:nowrap;}

/* Table export modal */
.export-overlay{position:fixed;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.export-overlay.active{opacity:1;pointer-events:all;}
.export-modal{background:#fff;border-radius:20px;width:min(560px,96vw);max-height:92vh;overflow-y:auto;transform:scale(0.95);transition:transform 0.2s;padding:2rem;}
.export-overlay.active .export-modal{transform:scale(1);}
.export-modal h2{font-size:1.05rem;font-weight:700;margin-bottom:1.25rem;color:#13122b;}
.export-options{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:1.25rem;}
.export-opt{border:1.5px solid var(--border);border-radius:10px;padding:0.85rem 1rem;cursor:pointer;transition:all 0.15s;}
.export-opt:hover,.export-opt.selected{border-color:#5a4fcf;background:#f0effd;}
.export-opt-title{font-size:0.875rem;font-weight:600;margin-bottom:0.2rem;}
.export-opt-desc{font-size:0.75rem;color:var(--muted);}
.export-field-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.25rem;}
.export-field-chip{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;border-radius:20px;
  border:1.5px solid var(--border);font-size:0.8rem;cursor:pointer;transition:all 0.15s;user-select:none;}
.export-field-chip.on{background:#13122b;color:#fff;border-color:#13122b;}
.export-actions{display:flex;justify-content:flex-end;gap:0.75rem;}
.btn-cancel{font-family:inherit;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:8px;
  background:#fff;border:1px solid var(--border);cursor:pointer;color:var(--muted);}
.btn-download{font-family:inherit;font-size:0.875rem;padding:0.5rem 1.5rem;border-radius:8px;
  background:#13122b;color:#fff;border:none;cursor:pointer;font-weight:600;transition:background 0.15s;}
.btn-download:hover{background:#3d3d8f;}
.btn-download:disabled{opacity:0.5;cursor:not-allowed;}
.progress-bar-wrap{height:4px;background:#eee;border-radius:2px;margin-bottom:1rem;overflow:hidden;display:none;}
.progress-bar{height:100%;background:linear-gradient(90deg,#ff6ea3,#9b59b6);width:0%;transition:width 0.2s;}
.export-preview{margin-top:1rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto;}


/* ── 手機版 RWD ── */
@media(max-width:800px){
  .sidebar{max-height:60vh;overflow-y:auto;}
  .badge-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.6rem;}
  .main{padding:0.75rem;}
  .result-bar{flex-direction:column;align-items:flex-start;}
  .site-header{padding:1.25rem 1rem 1rem;}
  .resize-handle{display:none;}
}
@media(max-width:800px){
  #header-controls{display:none !important;}
  #mobile-controls{display:flex !important;}
}
@media(max-width:480px){
  .badge-grid{grid-template-columns:repeat(3,1fr);gap:0.5rem;}
  .badge-info{padding:0.4rem 0.5rem 0.5rem;}
  .badge-char{font-size:0.78rem;}
  .badge-series{font-size:0.65rem;}
  .site-logo{font-size:clamp(1.4rem,8vw,2.5rem);}
}

</style>

function getYear(year){
  if(!year) return '';
  const m = year.match(/(\d{4})年/);
  return m ? m[1] : year;
}

function getEventShortName(event){
  if(!event) return '';
  if(eventShortNames[event]) return eventShortNames[event];
  // 若無簡稱，截短至10字
  return event.length > 10 ? event.slice(0, 10) + '…' : event;
}

  "Poppin'Party":"#ff69b4",
  "Roselia":"#1a2a6c",

};

  "高松燈":"#77BBDD",
  "千早愛音":"#FF8899",
  "要樂奈":"#77DD77",

let all=[];
let selBands=new Set(),selYears=new Set(),selSeries=new Set(),selEvents=new Set(),selTypes=new Set(),selChars=new Set(),selSizes=new Set(),selCountries=new Set();

async function init(){
  try{
    const r=await fetch('badges.json');
    if(!r.ok) throw 0;
    all=await r.json();
  } catch {
    all=[
      {id:"001",ext:"jpg",band:"Poppin'Party",character:"戸山香澄",series:"Ani-Art",year:"2022",event:"BanG Dream! 9th Live",note:""},
      {id:"002",ext:"jpg",band:"Roselia",character:"湊友希那",series:"Ani-Art",year:"2022",event:"BanG Dream! 9th Live",note:""},
      {id:"003",ext:"jpg",band:"MyGO!!!!!",character:"高松燈",series:"LIVE ver.",year:"2023",event:"BanG Dream! 10th Live",note:""},
      {id:"004",ext:"jpg",band:"Ave Mujica",character:"Oblivionis",series:"LIVE ver.",year:"2024",event:"Ave Mujica Anime",note:""},
      {id:"005",ext:"jpg",band:"Afterglow",character:"美竹蘭",series:"Ani-Art",year:"2021",event:"",note:""},
      {id:"006",ext:"jpg",band:"Roselia",character:"氷川紗夜",series:"Ani-Art",year:"2021",event:"",note:""},
    ];
  }
  applyLang();   // 先套語言，確保後續所有動態內容都用正確語言渲染
  buildSidebar();
  buildCharList();
  applyFilters();
}

function bandColor(b){ return BAND_COLORS[b]||'#888'; }

const ROUND_SIZES_SET = new Set(['56-58mm圓形','57mm圓形','56mm圓形','58mm圓形',
  '75mm圓形','54mm圓形','50mm圓形','30mm圓形','25mm圓形','15.2cm圓形']);
function isBadgeRound(size){ return !size || ROUND_SIZES_SET.has(size); }

function buildSidebar(){
  const bc={};
  all.forEach(b=>{bc[b.band]=(bc[b.band]||0)+1;});
  const bands=[...BAND_ORDER.filter(b=>bc[b]),...[...new Set(all.map(b=>b.band))].filter(b=>!BAND_ORDER.includes(b)&&bc[b])];
  document.getElementById('band-list').innerHTML=bands.map(band=>{
    const c=bandColor(band);
    const isActive=selBands.has(band);
    return `<div class="band-chip${isActive?' active':''}" id="bc-${band.replace(/[^a-z0-9]/gi,'_')}"
      style="--chip-color:${c};--chip-bg:${c}18"
      onclick="toggleBand('${band.replace(/'/g,"\\'")}')">
      <div class="band-dot" style="background:${c}"></div>
      <span style="color:${c}">${getBandName(band,currentLang)}</span>
      <span class="band-chip-count">${bc[band]}</span>
    </div>`;
  }).join('');

  buildCheckList('year-list','year-section',[...new Set(all.map(b=>getYear(b.year)).filter(Boolean))].sort((a,b)=>b-a),selYears,'toggleYear');
  buildCheckList('series-list','series-section',[...new Set(all.map(b=>b.series).filter(Boolean))].sort(),selSeries,'toggleSeries');
  buildCheckList('event-list','event-section',[...new Set(all.map(b=>b.event).filter(Boolean))].sort(),selEvents,'toggleEvent');
  // 類型：value 存繁中原始值，label 顯示對應語言
  const TYPE_ZH_LIST = ['角色本身','角色相關','角色聲優'];
  const typeDisplayMap = {
    '角色本身': {'zh-TW':'角色本身','zh-CN':'角色本身','ja':'キャラクター本人','en':'Character','ko':'캐릭터 본인'},
    '角色相關': {'zh-TW':'角色相關','zh-CN':'角色相关','ja':'キャラクター関連','en':'Character-related','ko':'캐릭터 관련'},
    '角色聲優': {'zh-TW':'角色聲優','zh-CN':'角色声优','ja':'声優','en':'Voice Actor','ko':'성우'},
  };
  const availTypes = TYPE_ZH_LIST.filter(t => all.some(b => b.type === t));
  const typeSec = document.getElementById('type-section');
  const typeListEl = document.getElementById('type-list');
  if(typeSec && typeListEl){
    if(!availTypes.length){ typeSec.style.display='none'; }
    else {
      typeSec.style.display='';
      typeListEl.innerHTML = availTypes.map(t => {
        const label = (typeDisplayMap[t]||{})[currentLang] || t;
        return `<label class="filter-item"><input type="checkbox" ${selTypes.has(t)?'checked':''} onchange="toggleType(this.value)" value="${t}"/><span>${label}</span></label>`;
      }).join('');
    }
  }
  const SIZE_ORDER = ['56mm圓形','57mm圓形','58mm圓形','15.2cm圓形','15cm圓形','75mm圓形','65mm圓形','60mm圓形','54mm圓形','50mm圓形','30mm圓形','25mm圓形','橢圓形','長方形','心形','名牌','磁鐵','約80mm布偶胸章','未確定'];
  const allSizes = [...new Set(all.map(b=>b.size).filter(Boolean))];
  const sortedSizes = [...SIZE_ORDER.filter(s=>allSizes.includes(s)),...allSizes.filter(s=>!SIZE_ORDER.includes(s)).sort()];
  // 尺寸：value 存繁中原始值，label 顯示對應語言
  const sizeSec = document.getElementById('size-section');
  const sizeListEl = document.getElementById('size-list');
  if(sizeSec && sizeListEl){
    if(!sortedSizes.length){ sizeSec.style.display='none'; }
    else {
      sizeSec.style.display='';
      sizeListEl.innerHTML = sortedSizes.map(s => {
        const label = getSizeName(s, currentLang);
        return `<label class="filter-item"><input type="checkbox" ${selSizes.has(s)?'checked':''} onchange="toggleSize(this.value)" value="${s}"/><span>${label}</span></label>`;
      }).join('');
    }
  }
  // 國家/地區：value 存繁中原始值，label 顯示對應語言
  const countrySec = document.getElementById('country-section');
  const countryListEl = document.getElementById('country-list');
  const allCountries = [...new Set(all.map(b=>b.country).filter(Boolean))].sort();
  if(countrySec && countryListEl){
    if(!allCountries.length){ countrySec.style.display='none'; }
    else {
      countrySec.style.display='';
      countryListEl.innerHTML = allCountries.map(c => {
        const label = getCountryName(c, currentLang);
        return `<label class="filter-item"><input type="checkbox" ${selCountries.has(c)?'checked':''} onchange="toggleCountry(this.value)" value="${c}"/><span>${label}</span></label>`;
      }).join('');
    }
  }
}

function buildCheckList(listId,secId,items,selSet,fn){
  const sec=document.getElementById(secId);
  if(!items.length){sec.style.display='none';return;}
  sec.style.display='';
  document.getElementById(listId).innerHTML=items.map(v=>`
    <label class="filter-item">
      <input type="checkbox" ${selSet.has(v)?'checked':''} onchange="${fn}(this.value)" value="${v.replace(/"/g,'&quot;')}"/>
      <span>${v}</span>
    </label>`).join('');
}

function toggleBand(b){
  selBands.has(b)?selBands.delete(b):selBands.add(b);
  const el=document.getElementById('bc-'+b.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.classList.toggle('active',selBands.has(b));
  selChars.clear();
  buildCharList();
  applyFilters();
}

function buildCharList(){
  const sec=document.getElementById('char-section');
  // 必須先選樂團才顯示角色
  if(selBands.size===0){ sec.style.display='none'; return; }
  const source = all.filter(b=>selBands.has(b.band));
  const CHAR_ORDER = [
    '戶山香澄','花園多惠','牛込里美','山吹紗綾','市谷有咲',
    '美竹蘭','青葉摩卡','上原緋瑪麗','宇田川巴','羽澤鶇',
    '丸山彩','冰川日菜','白鷺千聖','大和麻彌','若宮伊芙',
    '湊友希那','冰川紗夜','今井莉莎','宇田川亞子','白金燐子',
    '弦卷心','瀨田薰','北澤育美','松原花音','奧澤美咲',
    '倉田真白','桐谷透子','廣町七深','二葉筑紫','八潮瑠唯',
    '和奏瑞依(LAYER)','朝日六花(ROCK)','佐藤益木(MASKING)','鳰原令王那(PAREO)','珠手知由(CHU2)',
    '高松燈','千早愛音','要樂奈','長崎爽世','椎名立希',
    '三角初華','若葉睦','八幡海鈴','祐天寺若麥','豐川祥子',
    '三角初華(Doloris)','若葉睦(Mortis)','八幡海鈴(Timoris)','祐天寺若麥(Amoris)','豐川祥子(Oblivionis)',
    '仲町阿拉蕾','宮永野乃花','峰月律','藤都子','千石由乃',
    '汐見螢','琴平凪','濱崎茉幌','伊澤棗','和泉朋花',
    '須賀蕾叶','馬橋心玖','矢倉蓬咲','梅里千櫻梨','四宮寧月',
  ];
  const charSet = new Set(source.map(b=>b.character).filter(Boolean));
  const chars = [
    ...CHAR_ORDER.filter(c=>charSet.has(c)),
    ...[...charSet].filter(c=>!CHAR_ORDER.includes(c)).sort((a,b)=>a.localeCompare(b))
  ];
  if(!chars.length){sec.style.display='none';return;}
  sec.style.display='';
  document.getElementById('char-list').innerHTML=chars.map(v=>`
    <label class="filter-item">
      <input type="checkbox" ${selChars.has(v)?'checked':''} onchange="toggleChar(this.value)" value="${v.replace(/"/g,'&quot;')}"/>
      <span>${getCharName(v, currentLang)}</span>
    </label>`).join('');
}

function toggleChar(c){selChars.has(c)?selChars.delete(c):selChars.add(c);applyFilters();}
function toggleYear(y){selYears.has(y)?selYears.delete(y):selYears.add(y);applyFilters();}
function toggleSeries(s){selSeries.has(s)?selSeries.delete(s):selSeries.add(s);applyFilters();}
function toggleEvent(e){selEvents.has(e)?selEvents.delete(e):selEvents.add(e);applyFilters();}
function toggleType(t){selTypes.has(t)?selTypes.delete(t):selTypes.add(t);applyFilters();}
function toggleSize(s){selSizes.has(s)?selSizes.delete(s):selSizes.add(s);applyFilters();}
function toggleCountry(c){selCountries.has(c)?selCountries.delete(c):selCountries.add(c);applyFilters();}

function resetFilters(){
  selBands.clear();selYears.clear();selSeries.clear();selEvents.clear();selTypes.clear();selChars.clear();selSizes.clear();selCountries.clear();
  document.getElementById('search').value='';
  document.querySelectorAll('.band-chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.filter-item input').forEach(i=>i.checked=false);
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase();
  const sort=document.getElementById('sort').value;
  let res=all.filter(b=>{
    if(selBands.size&&!selBands.has(b.band)) return false;
    if(selChars.size&&!selChars.has(b.character)) return false;
    if(selYears.size&&!selYears.has(getYear(b.year))) return false;
    if(selSeries.size&&!selSeries.has(b.series)) return false;
    if(selEvents.size&&!selEvents.has(b.event)) return false;
    if(selTypes.size&&!selTypes.has(b.type)) return false;
    if(selSizes.size&&!selSizes.has(b.size)) return false;
    if(selCountries.size&&!selCountries.has(b.country)) return false;
    if(q&&![b.id,b.character,b.series,b.event,b.band,b.note].some(v=>(v||'').toLowerCase().includes(q))) return false;
    return true;
  });
  res=res.slice().sort((a,b)=>{
    if(sort==='id-asc') return (a.id||'').localeCompare(b.id||'',undefined,{numeric:true});
    if(sort==='id-desc') return (b.id||'').localeCompare(a.id||'',undefined,{numeric:true});
    if(sort==='year-desc'||sort==='year-asc'){
      // 無日期排最後
      const aLast = !a.year ? 1 : 0;
      const bLast = !b.year ? 1 : 0;
      if(aLast !== bLast) return aLast - bLast;
      const ay = (a.year||'').replace(/[年月日]/g,'/').replace(/\/$/,'');
      const by2 = (b.year||'').replace(/[年月日]/g,'/').replace(/\/$/,'');
      const ad = new Date(ay||0), bd = new Date(by2||0);
      const dateDiff = sort==='year-desc' ? bd-ad : ad-bd;
      if(dateDiff !== 0) return dateDiff;
      // 日期相同：先按活動名稱排序
      const evA = a.event||'', evB = b.event||'';
      const evDiff = evA.localeCompare(evB);
      if(evDiff !== 0) return evDiff;
      // 活動相同：按樂團順序
      const BAND_ORDER_SORT = ["Poppin'Party","Afterglow","Pastel*Palettes","Roselia",
        "Hello, Happy World!","Morfonica","RAISE A SUILEN","MyGO!!!!!",
        "Ave Mujica","夢限大MewType","millsage","一家Dumb Rock!"];
      const bIdxA = BAND_ORDER_SORT.indexOf(a.band);
      const bIdxB = BAND_ORDER_SORT.indexOf(b.band);
      const bandIdxA = bIdxA === -1 ? 999 : bIdxA;
      const bandIdxB = bIdxB === -1 ? 999 : bIdxB;
      const bandDiff = bandIdxA - bandIdxB;
      if(bandDiff !== 0) return bandDiff;
      // 樂團相同：按角色 CHAR_ORDER 順序
      const CHAR_SORT_ORDER2 = [
        '戶山香澄','花園多惠','牛込里美','山吹紗綾','市谷有咲',
        '美竹蘭','青葉摩卡','上原緋瑪麗','宇田川巴','羽澤鶇',
        '丸山彩','冰川日菜','白鷺千聖','大和麻彌','若宮伊芙',
        '湊友希那','冰川紗夜','今井莉莎','宇田川亞子','白金燐子',
        '弦卷心','瀨田薰','北澤育美','松原花音','奧澤美咲',
        '倉田真白','桐谷透子','廣町七深','二葉筑紫','八潮瑠唯',
        '和奏瑞依(LAYER)','朝日六花(ROCK)','佐藤益木(MASKING)','鳰原令王那(PAREO)','珠手知由(CHU2)',
        '高松燈','千早愛音','要樂奈','長崎爽世','椎名立希',
        '三角初華','若葉睦','八幡海鈴','祐天寺若麥','豐川祥子',
        '三角初華(Doloris)','若葉睦(Mortis)','八幡海鈴(Timoris)','祐天寺若麥(Amoris)','豐川祥子(Oblivionis)',
        '仲町阿拉蕾','宮永野乃花','峰月律','藤都子','千石由乃',
        '汐見螢','琴平凪','濱崎茉幌','伊澤棗','和泉朋花',
        '須賀蕾叶','馬橋心玖','矢倉蓬咲','梅里千櫻梨','四宮寧月',
      ];
      const ci2 = CHAR_SORT_ORDER2.indexOf(a.character||'');
      const di2 = CHAR_SORT_ORDER2.indexOf(b.character||'');
      const cIdx = ci2 === -1 ? 9999 : ci2;
      const dIdx = di2 === -1 ? 9999 : di2;
      if(cIdx !== dIdx) return cIdx - dIdx;
      // 角色相同：按編號
      return (a.id||'').localeCompare(b.id||'',undefined,{numeric:true});
    }
    if(sort==='char'){
      // 按 CHAR_ORDER 預設順序排列
      const CHAR_SORT_ORDER = [
        '戶山香澄','花園多惠','牛込里美','山吹紗綾','市谷有咲',
        '美竹蘭','青葉摩卡','上原緋瑪麗','宇田川巴','羽澤鶇',
        '丸山彩','冰川日菜','白鷺千聖','大和麻彌','若宮伊芙',
        '湊友希那','冰川紗夜','今井莉莎','宇田川亞子','白金燐子',
        '弦卷心','瀨田薰','北澤育美','松原花音','奧澤美咲',
        '倉田真白','桐谷透子','廣町七深','二葉筑紫','八潮瑠唯',
        '和奏瑞依(LAYER)','朝日六花(ROCK)','佐藤益木(MASKING)','鳰原令王那(PAREO)','珠手知由(CHU2)',
        '高松燈','千早愛音','要樂奈','長崎爽世','椎名立希',
        '三角初華','若葉睦','八幡海鈴','祐天寺若麥','豐川祥子',
        '三角初華(Doloris)','若葉睦(Mortis)','八幡海鈴(Timoris)','祐天寺若麥(Amoris)','豐川祥子(Oblivionis)',
        '仲町阿拉蕾','宮永野乃花','峰月律','藤都子','千石由乃',
        '汐見螢','琴平凪','濱崎茉幌','伊澤棗','和泉朋花',
        '須賀蕾叶','馬橋心玖','矢倉蓬咲','梅里千櫻梨','四宮寧月',
      ];
      const ai = CHAR_SORT_ORDER.indexOf(a.character||'');
      const bi = CHAR_SORT_ORDER.indexOf(b.character||'');
      const aIdx = ai === -1 ? 9999 : ai;
      const bIdx = bi === -1 ? 9999 : bi;
      if(aIdx !== bIdx) return aIdx - bIdx;
      return (a.id||'').localeCompare(b.id||'',undefined,{numeric:true});
    }
    // 預設：依原始陣列順序
    return all.indexOf(a) - all.indexOf(b);
  });
  // 若無任何篩選條件，顯示提示不顯示資料
  const hasFilter = selBands.size||selYears.size||selSeries.size||selEvents.size||
    selTypes.size||selChars.size||selSizes.size||selCountries.size||
    document.getElementById('search').value.trim();
  if(!hasFilter){
    const L=LANGS[currentLang];
    document.getElementById('result-count').textContent=L.noFilter;
    renderGrid([]);
    document.getElementById('badge-grid').innerHTML=`
      <div class="empty-main">
        <div style="font-size:3rem">🎵</div>
        <div style="margin-top:0.75rem;font-size:1rem;font-weight:600;color:var(--text)">${L.filterTip}</div>
        <div style="margin-top:0.5rem;font-size:0.85rem" id="filter-sub-text">${(LANGS[currentLang]||LANGS['zh-TW']).filterSub||'選擇樂團、角色、類型等條件來顯示徽章'}</div>
      </div>`;
    return;
  }
  document.getElementById('result-count').textContent=`顯示 ${res.length} / ${all.length} 枚`;
  renderGrid(res);
}

function renderGrid(list){
  const g=document.getElementById('badge-grid');
  if(!list.length){
    const L=LANGS[currentLang];
    g.innerHTML=`<div class="empty-main"><div style="font-size:3rem">🔍</div><div style="margin-top:0.75rem">${L.noResult}</div></div>`;
    return;
  }
  g.innerHTML=list.map(b=>{
    const c=bandColor(b.band);
    const src = IMG_BASE_URL + b.id + '.' + (b.ext||'jpg');
    const idx=all.indexOf(b);
    const shortEvent = getEventShortName(b.event);
    const eventHtml = b.url
      ? `<a href="${b.url}" target="_blank" rel="noopener" class="expand-link" onclick="event.stopPropagation()">${b.event||'—'}</a>`
      : (b.event||'—');
    const shortEventHtml = b.url
      ? `<a href="${b.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:#5a4fcf;text-decoration:none;">${shortEvent}</a>`
      : shortEvent;
    return `<div class="badge-card" onclick="toggleCard(this,${idx})" style="position:relative;">
      <div class="badge-id-tag" style="position:absolute;top:5px;right:5px;z-index:2;background:rgba(0,0,0,0.5);color:#fff;font-size:0.6rem;font-family:monospace;padding:0.1rem 0.35rem;border-radius:4px;pointer-events:none;">#${b.id}</div>
      <div class="badge-img-wrap">
        <img src="${src}" alt="${b.character||b.id}" loading="lazy"
          class="${isBadgeRound(b.size)?'':'non-round'}"
          style="${isBadgeRound(b.size)?'border-radius:50%;':''}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="no-img" style="display:none;color:${CHAR_COLORS[b.character]||CHAR_COLORS.default}">🎵</div>
      </div>
      <div class="badge-info">
        <div class="badge-char">${getCharName(b.character,currentLang)||'—'}</div>
        <span class="badge-band-tag" style="background:${c}20;color:${c}">${getBandName(b.band,currentLang)||'—'}</span>
        ${b.series?`<div class="badge-series">${b.series}</div>`:''}
        ${b.event?`<div class="badge-series" style="margin-top:0.25rem;">${shortEventHtml}</div>`:''}
      </div>
      <div class="badge-card-expand">
        ${b.event?`<div class="expand-field"><span class="expand-label">活動</span><span class="expand-value">${eventHtml}</span></div>`:''}
        ${b.year?`<div class="expand-field"><span class="expand-label">發售日期</span><span class="expand-value">${b.year}</span></div>`:''}
        ${b.size?`<div class="expand-field"><span class="expand-label">尺寸</span><span class="expand-value">${b.size}</span></div>`:''}
        ${b.series?`<div class="expand-field"><span class="expand-label">版本/工藝</span><span class="expand-value">${b.series}</span></div>`:''}
        ${b.type?`<div class="expand-field"><span class="expand-label">類型</span><span class="expand-value">${b.type}</span></div>`:''}
        ${b.country?`<div class="expand-field"><span class="expand-label">活動國家</span><span class="expand-value">${b.country}</span></div>`:''}
        ${b.note?`<div class="expand-field"><span class="expand-label">備註</span><span class="expand-value">${b.note}</span></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(card, idx){
  const wasExpanded = card.classList.contains('expanded');
  // 收起其他已展開的卡片
  document.querySelectorAll('.badge-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if(!wasExpanded) card.classList.add('expanded');
}

function openDetail(idx){
  const b=all[idx];
  const c=bandColor(b.band);
  const dImg = document.getElementById('d-img');
  dImg.src=IMG_BASE_URL+b.id+'.'+(b.ext||'jpg');
  dImg.onerror=function(){this.style.display='none';};
  dImg.style.display='block';
  dImg.className = isBadgeRound(b.size) ? 'detail-img' : 'detail-img non-round';
  document.getElementById('d-band').textContent=getBandName(b.band,currentLang)||'—';
  document.getElementById('d-band').style.cssText=`background:${c}20;color:${c}`;
  document.getElementById('d-char').textContent=b.character||'—';
  document.getElementById('d-series').textContent=b.series||'—';
  document.getElementById('d-type').textContent=b.type||'—';
  document.getElementById('d-size').textContent=b.size||'—';
  document.getElementById('d-country').textContent=b.country||'—';
  document.getElementById('d-year').textContent=b.year||'—';
  const dEvent = document.getElementById('d-event');
  if(b.url){
    dEvent.innerHTML=`<a href="${b.url}" target="_blank" rel="noopener" style="color:#5a4fcf;text-decoration:underline;">${b.event||'—'}</a>`;
  } else {
    dEvent.textContent=b.event||'—';
  }
  const dn=document.getElementById('d-note');
  if(b.note){dn.textContent=b.note;dn.style.display='block';}else dn.style.display='none';
  document.getElementById('detail-overlay').classList.add('active');
}

function maybeClose(e){if(e.target===document.getElementById('detail-overlay'))closeDetail();}
function closeDetail(){document.getElementById('detail-overlay').classList.remove('active');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

  const t = SIZE_TRANS[size];
  return t ? (t[lang]||size) : size;

function getCountryName(country, lang){
  if(!country || !lang || lang==='zh-TW') return country;
  const t = COUNTRY_TRANS[country];

}

function getCharName(charTW, lang) {
  if(!charTW || !lang) return charTW;
  const map = CHAR_NAME_MAP[charTW];
  if(!map) return charTW;
  // zh-TW 也查表（Ave Mujica 等有特殊顯示名）
  return map[lang] || (lang === 'zh-TW' ? charTW : charTW);
}

let currentLang = (()=>{
  const saved = localStorage.getItem('lang');
  // 已移除簡中，若舊存檔是 zh-CN 則改為 zh-TW
  if(saved === 'zh-CN'){ localStorage.setItem('lang','zh-TW'); return 'zh-TW'; }
  return saved || 'zh-TW';
})();

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('lang', lang);
  applyLang();
  if(all.length){
    buildSidebar();   // 重建 sidebar
    buildCharList();  // 重建角色清單（更新顯示語言）
  }
  applyFilters(); // 無論有無資料都重跑，確保提示語言正確
}

function applyLang(){
  const L = LANGS[currentLang] || LANGS['zh-TW'];
  // 語言按鈕高亮
  ['zh-TW','ja','en','ko'].forEach(l=>{
    const btn = document.getElementById('lang-'+l.replace('-TW','zh').replace('-CN','cn').replace('-',''));
    if(btn){ btn.style.background = l===currentLang?'#ffffff55':'#ffffff22'; btn.style.fontWeight = l===currentLang?'700':'400'; }
    const mbtn = document.getElementById('mlang-'+l.replace('-TW','zh').replace('-CN','cn').replace('-',''));
    if(mbtn){ mbtn.style.background=l===currentLang?'#5a4fcf':'var(--bg)'; mbtn.style.color=l===currentLang?'#fff':'var(--text)'; mbtn.style.borderColor=l===currentLang?'#5a4fcf':'var(--border)'; }
  });
  // 標題
  document.title = L.title;
  // 搜尋框
  const searchEl = document.getElementById('search');
  if(searchEl) searchEl.placeholder = L.search;
  // sidebar h3
  const sidebarMap = {
    'search-section': L.search, 'band-section': L.band, 'char-section': L.char,
    'year-section': L.year, 'series-section': L.series, 'event-section': L.event,
    'type-section': L.type, 'size-section': L.size, 'country-section': L.country,
  };
  Object.entries(sidebarMap).forEach(([id, label]) => {
    const sec = document.getElementById(id);
    if(sec){ const h3 = sec.querySelector('h3'); if(h3 && label) h3.textContent = label; }
  });
  // 重置按鈕（兩個）
  document.querySelectorAll('[onclick="resetFilters()"]').forEach(btn=>{ if(L.reset) btn.textContent = L.reset; });
  // 排序選單
  const sortSel = document.getElementById('sort');
  if(sortSel){ sortSel.options[0].text=L.sortNew; sortSel.options[1].text=L.sortOld; sortSel.options[2].text=L.sortChar; }
  // 視圖/下載按鈕
  const dlBtn = document.querySelector('[onclick="openExport()"]');
  if(dlBtn) dlBtn.textContent = L.download;
  const gridBtn = document.getElementById('btn-grid');
  const tableBtn = document.getElementById('btn-table');
  if(gridBtn) gridBtn.textContent = '⊞ ' + L.gridView;
  if(tableBtn) tableBtn.textContent = '☰ ' + L.tableView;
  // detail modal labels
  const dlS=document.getElementById('dl-series'); if(dlS) dlS.textContent=L.dlSeries||L.series;
  const dlY=document.getElementById('dl-year');   if(dlY) dlY.textContent=L.dlYear||L.year;
  const dlE=document.getElementById('dl-event');  if(dlE) dlE.textContent=L.dlEvent||L.event;
  // table headers
  const thB=document.getElementById('th-band');    if(thB) thB.textContent=L.thBand||L.band;
  const thC=document.getElementById('th-char');    if(thC) thC.textContent=L.thChar||L.char;
  const thEv=document.getElementById('th-event');  if(thEv) thEv.textContent=L.thEvent||L.event;
  const thY=document.getElementById('th-year');    if(thY) thY.textContent=L.thYear||L.year;
  const thSr=document.getElementById('th-series'); if(thSr) thSr.textContent=L.thSeries||L.series;
  // export modal
  const eh2=document.getElementById('exp-title-h2');  if(eh2&&L.expTitle) eh2.textContent=L.expTitle;
  const edp=document.getElementById('exp-desc-pre');   if(edp&&L.expDescPre) edp.textContent=L.expDescPre;
  const edo=document.getElementById('exp-desc-post');  if(edo&&L.expDescPost) edo.textContent=L.expDescPost;
  const ehl=document.getElementById('exp-h3-layout');  if(ehl&&L.expLayout) ehl.textContent=L.expLayout;
  const ehc=document.getElementById('exp-h3-cols');    if(ehc&&L.expCols) ehc.textContent=L.expCols;
  const ehf=document.getElementById('exp-h3-fields');  if(ehf&&L.expFields) ehf.textContent=L.expFields;
  const ehfm=document.getElementById('exp-h3-fmt');    if(ehfm&&L.expFmt) ehfm.textContent=L.expFmt;
  const ehtl=document.getElementById('exp-h3-ttl');    if(ehtl&&L.expTitleLabel) ehtl.textContent=L.expTitleLabel;
  const egt=document.getElementById('exp-grid-title'); if(egt&&L.expGrid) egt.textContent=L.expGrid;
  const egd=document.getElementById('exp-grid-desc');  if(egd&&L.expGridDesc) egd.textContent=L.expGridDesc;
  const ett=document.getElementById('exp-table-title');if(ett&&L.expTable) ett.textContent=L.expTable;
  const etd=document.getElementById('exp-table-desc'); if(etd&&L.expTableDesc) etd.textContent=L.expTableDesc;
  const ebc=document.getElementById('exp-btn-cancel'); if(ebc&&L.expCancel) ebc.textContent=L.expCancel;
  const ebd=document.getElementById('btn-dl');         if(ebd&&L.expDownload) ebd.textContent=L.expDownload;
  // 更新日誌標題
  const at=document.getElementById('announce-title'); if(at&&L.announceTitle) at.textContent=L.announceTitle;
  // filter sub text
  const fst=document.getElementById('filter-sub-text'); if(fst&&L.filterSub) fst.textContent=L.filterSub;
}

async function loadChangelog(){
  try{
    const res = await fetch('changelog.json?t=' + Date.now());
    const text = await res.text();
    const data = JSON.parse(text);
    const body = document.getElementById('announce-body');
    if(!data.length){ body.innerHTML='<div style="color:var(--muted);font-size:0.78rem;padding:0.5rem;">暫無更新記錄</div>'; return; }
    body.innerHTML = data.map(item=>`
      <div class="announce-item">
        <div class="announce-date">${item.date}</div>
        <div>${item.content.replace(/\n/g,'<br>')}</div>
      </div>`).join('');
  } catch(e){
    document.getElementById('announce-body').innerHTML='<div style="color:var(--muted);font-size:0.78rem;padding:0.5rem;">載入失敗</div>';
  }
}

(function(){
  const handle = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e=>{
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const newW = Math.min(600, Math.max(240, startW + (e.clientX - startX)));
    sidebar.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', ()=>{
    if(!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── 浮水印 ──
function drawWatermark(ctx, W, H){
  const text = '千早愛音的暴躁柯基製作';
  const PAD = 16;
  ctx.save();
  ctx.font = 'bold 13px "Noto Sans TC",sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  const metrics = ctx.measureText(text);
  const tw = metrics.width + 10;
  const th = 20;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(W - PAD - tw, H - PAD - th, tw, th);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText(text, W - PAD, H - PAD);
  ctx.restore();
}

async function doExport(){
  const btn = document.getElementById('btn-dl');
  const progWrap = document.getElementById('prog-wrap');
  const prog = document.getElementById('prog-bar');
  btn.disabled = true; btn.textContent = '產生中...';
  progWrap.style.display = 'block'; prog.style.width = '0%';

  const title = document.getElementById('export-title').value || 'BanG Dream! 徽章圖鑑';
  const list = currentFiltered;

  // Excel 輸出
  if(exportFmt === 'xlsx'){
    doExportXlsx(list, title, btn, progWrap, prog);
    return;
  }
  // HTML 輸出
  if(exportFmt === 'html'){
    doExportHtml(list, title, btn, progWrap, prog);
    return;
  }

  if(exportLayout === 'table'){
    await doExportTable(list, title, btn, progWrap, prog);
    return;
  }

  // ── Grid mode with type + size grouping ──
  const CELL = 110;
  const COLS = exportCols;
  const PAD = 28;
  const GAP = 10;
  const HEADER_H = 72;
  const TYPE_H = 36;   // 類型標題高度
  const SIZE_H = 28;   // 尺寸標題高度
  const LABEL_H = 72;  // 活動簡稱+版本高度
  const ITEM_H = CELL + LABEL_H + GAP;
  const W = COLS * (CELL + GAP) + PAD * 2;

  const TYPE_ORDER = ['角色本身', '角色相關', '角色聲優', ''];
  const SIZE_ORDER = [
    '56mm圓形','57mm圓形','58mm圓形','56-58mm圓形',
    '15.2cm圓形','15cm圓形','75mm圓形','60mm圓形',
    '54mm圓形','50mm圓形','30mm圓形','25mm圓形',
    '橢圓形','長方形','心形','名牌','磁鐵','約80mm布偶胸章','未確定',
  ];
  // 下載時合併為同一區塊的尺寸
  const SIZE_56_GROUP = new Set(['56mm圓形','57mm圓形','58mm圓形','56-58mm圓形']);
  const ROUND_SIZES = new Set(['56-58mm圓形','75mm圓形','60mm圓形','54mm圓形',
    '50mm圓形','30mm圓形','25mm圓形','未確定','15.2cm圓形']);

  function isRound(size){ return ROUND_SIZES.has(size||''); }

  // 分組：type → size → badges
  function groupBadges(badges){
    const groups = [];
    const types = [...new Set(badges.map(b=>b.type||''))].sort((a,b)=>{
      const ai = TYPE_ORDER.indexOf(a||''); const bi = TYPE_ORDER.indexOf(b||'');
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });
    for(const type of types){
      const byType = badges.filter(b=>(b.type||'')===type);
      // 取得此類型內出現的尺寸，依 SIZE_ORDER 排序
      // 先把 56/57/58mm 合併成一個群組
      const sizeSet = [...new Set(byType.map(b=>b.size||'其他'))];
      const has56Group = sizeSet.some(s=>SIZE_56_GROUP.has(s));
      const otherSizes = sizeSet.filter(s=>!SIZE_56_GROUP.has(s));
      const sortedSizes = [];
      if(has56Group) sortedSizes.push('__56group__');
      otherSizes.sort((a,b)=>{
        const ai = SIZE_ORDER.indexOf(a); const bi = SIZE_ORDER.indexOf(b);
        return (ai===-1?99:ai)-(bi===-1?99:bi);
      }).forEach(s=>sortedSizes.push(s));

      for(const size of sortedSizes){
        let items, sizeLabel;
        if(size==='__56group__'){
          items = byType.filter(b=>SIZE_56_GROUP.has(b.size||''));
          sizeLabel = '56-58mm圓形';
        } else {
          items = byType.filter(b=>(b.size||'其他')===size);
          sizeLabel = size||'其他';
        }
        if(items.length){
          items.sort((a,b)=>{
            const aLast = !a.year ? 1 : 0;
            const bLast = !b.year ? 1 : 0;
            return aLast - bLast;
          });
          groups.push({type, sizeLabel, items});
        }
      }
    }
    return groups;
  }

  // 計算總高度
  function calcHeight(groups){
    let h = HEADER_H + PAD;
    let prevT = null;
    for(const g of groups){
      if(g.type !== prevT){ h += TYPE_H + 6; prevT = g.type; }
      h += SIZE_H + 8;
      const rows = Math.ceil(g.items.length / COLS);
      h += rows * ITEM_H + PAD;
    }
    return h + PAD;
  }

  const groups = groupBadges(list);
  const H = calcHeight(groups);

  // Load images
  const imgMap = {};
  await Promise.all(list.map(b => new Promise(res=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{ imgMap[b.id]=img; res(); };
    img.onerror = ()=>res();
    img.src = IMG_BASE_URL + b.id + '.' + (b.ext||'jpg');
  })));
  prog.style.width = '50%';

  // 圖片載入後，無圖片的排到每個群組最後
  for(const g of groups){
    g.items.sort((a,b)=>{
      const aNoImg = !imgMap[a.id] ? 1 : 0;
      const bNoImg = !imgMap[b.id] ? 1 : 0;
      if(aNoImg !== bNoImg) return aNoImg - bNoImg;
      // 無日期也排最後
      const aNoDate = !a.year ? 1 : 0;
      const bNoDate = !b.year ? 1 : 0;
      return aNoDate - bNoDate;
    });
  }

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#faf9f5';
  ctx.fillRect(0,0,W,H);

  // Header
  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#ff6eb4'); grad.addColorStop(1,'#c0005a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(PAD/2, PAD/2, W-PAD, HEADER_H-8, 12); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px "Noto Sans TC",sans-serif'; ctx.textAlign='left';
  ctx.fillText(title, PAD*1.5, PAD/2+36);
  ctx.font = '13px sans-serif'; ctx.fillStyle='#ffffff99';
  ctx.fillText(`共 ${list.length} 枚`, PAD*1.5, PAD/2+56);

  // Draw groups
  let curY = HEADER_H + PAD;
  let prevType = null;

  for(const g of groups){
    // 類型標題（只在換類型時顯示）
    if(g.type !== prevType){
      const typeDisplayMap2 = {
        '角色本身': {'zh-TW':'角色本身','zh-CN':'角色本身','ja':'キャラクター本人','en':'Character','ko':'캐릭터 본인'},
        '角色相關': {'zh-TW':'角色相關','zh-CN':'角色相关','ja':'キャラクター関連','en':'Character-related','ko':'캐릭터 관련'},
        '角色聲優': {'zh-TW':'角色聲優','zh-CN':'角色声优','ja':'声優','en':'Voice Actor','ko':'성우'},
      };
      const typeLabel = ((typeDisplayMap2[g.type]||{})[currentLang]) || g.type || '未分類';
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.roundRect(PAD, curY, W-PAD*2, TYPE_H, 8); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px "Noto Sans TC",sans-serif'; ctx.textAlign='left';
      ctx.fillText('▌ ' + typeLabel, PAD+12, curY+24);
      curY += TYPE_H + 6;
      prevType = g.type;
    }

    // 尺寸標題
    ctx.fillStyle = '#e8e5f5';
    ctx.beginPath(); ctx.roundRect(PAD, curY, W-PAD*2, SIZE_H, 6); ctx.fill();
    ctx.fillStyle = '#3d3d8f';
    ctx.font = 'bold 13px "Noto Sans TC",sans-serif'; ctx.textAlign='left';
    ctx.fillText(getSizeName(g.sizeLabel, currentLang), PAD+10, curY+19);
    curY += SIZE_H + 8;

    // 徽章
    g.items.forEach((b, i)=>{
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const x = PAD + col*(CELL+GAP);
      const y = curY + row * ITEM_H;
      const c = bandColor(b.band);
      const isRoundBadge = isRound(b.size||'');

      // Card bg
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.roundRect(x, y, CELL, CELL, isRoundBadge?CELL/2:8); ctx.fill();
      ctx.strokeStyle = c+'44'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(x, y, CELL, CELL, isRoundBadge?CELL/2:8); ctx.stroke();

      // Image
      const img = imgMap[b.id];
      if(img){
        ctx.save();
        if(isRoundBadge){
          ctx.beginPath();
          ctx.arc(x+CELL/2, y+CELL/2, CELL/2-3, 0, Math.PI*2);
          ctx.clip();
          ctx.drawImage(img, x+3, y+3, CELL-6, CELL-6);
        } else {
          // 非圓形：保持比例完整顯示
          const iw = img.naturalWidth, ih = img.naturalHeight;
          const scale = Math.min((CELL-8)/iw, (CELL-8)/ih);
          const dw = iw*scale, dh = ih*scale;
          const dx = x + (CELL-dw)/2, dy = y + (CELL-dh)/2;
          ctx.beginPath(); ctx.roundRect(x+3, y+3, CELL-6, CELL-6, 6); ctx.clip();
          ctx.drawImage(img, dx, dy, dw, dh);
        }
        ctx.restore();
      } else {
        const charColor = CHAR_COLORS[b.character] || CHAR_COLORS.default;
        ctx.fillStyle = charColor + '33';
        ctx.beginPath(); ctx.roundRect(x+3, y+3, CELL-6, CELL-6, isRoundBadge?CELL/2:6); ctx.fill();
        ctx.fillStyle = charColor; ctx.font='22px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🎵', x+CELL/2, y+CELL/2+8);
      }

      // 活動簡稱 label（支援換行）
      const shortName = b.short_event || getEventShortName(b.event||'');
      ctx.fillStyle = '#333';
      ctx.font = '10px "Noto Sans TC",sans-serif'; ctx.textAlign='center';
      const maxW = CELL - 4;
      // 自動換行
      const words = shortName.split('');
      let line = '', lines = [];
      for(const ch of words){
        if(ctx.measureText(line+ch).width > maxW){
          lines.push(line); line = ch;
        } else { line += ch; }
      }
      if(line) lines.push(line);
      lines = lines.slice(0,3); // 最多3行
      lines.forEach((l,li)=>{
        ctx.fillText(l, x+CELL/2, y+CELL+14+(li*14));
      });

      // 版本
      if(b.series){
        ctx.fillStyle = '#888';
        ctx.font = '9px "Noto Sans TC",sans-serif'; ctx.textAlign='center';
        const seriesText = b.series.length > 12 ? b.series.slice(0,11)+'…' : b.series;
        ctx.fillText(seriesText, x+CELL/2, y+CELL+14+(lines.length*14)+2);
      }
    });

    const rows = Math.ceil(g.items.length / COLS);
    curY += rows * ITEM_H + PAD;
  }

  // 浮水印
  drawWatermark(ctx, W, H);

  prog.style.width='95%';
  // 依格式輸出
  if(exportFmt === 'pdf'){
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF({orientation: canvas.width>canvas.height?'landscape':'portrait', unit:'px', format:[canvas.width, canvas.height]});
    pdf.addImage(imgData,'PNG',0,0,canvas.width,canvas.height);
    pdf.save(`bandori-badges-${Date.now()}.pdf`);
    prog.style.width='100%';
    setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇ 下載'; progWrap.style.display='none'; prog.style.width='0%'; },600);
  } else {
    const mimeType = exportFmt==='jpg' ? 'image/jpeg' : 'image/png';
    const ext = exportFmt==='jpg' ? 'jpg' : 'png';
    canvas.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download=`bandori-badges-${Date.now()}.${ext}`;
      a.click(); URL.revokeObjectURL(url);
      prog.style.width='100%';
      setTimeout(()=>{ btn.disabled=false; btn.textContent='⬇ 下載'; progWrap.style.display='none'; prog.style.width='0%'; },600);
    }, mimeType, 0.92);
  }
}

async function doExportTable(list, title, btn, progWrap, prog){
  const fields = getExportFields().filter(f=>selectedFields.has(f.key));
  const PAD=32, TH=40, ROW_H=52, THUMB=40, HEADER_H=64;
  // 各欄位寬度
  const FIELD_WIDTHS = {band:120, character:100, event:320, year:130, series:150};
  const DEFAULT_W = 150;
  const totalFieldW = fields.reduce((s,f)=>s+(FIELD_WIDTHS[f.key]||DEFAULT_W), 0);
  const W = 60 + totalFieldW + PAD*2;
  const H = HEADER_H + TH + list.length*ROW_H + PAD*2 + 30;

  const canvas = document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle='#faf9f5'; ctx.fillRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#13122b'); grad.addColorStop(1,'#2d1b4e');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.roundRect(PAD/2,PAD/2,W-PAD,HEADER_H,12); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 22px "Noto Sans TC",sans-serif'; ctx.textAlign='left';
  ctx.fillText(title, PAD*1.5, PAD/2+38);

  const imgs = await Promise.all(list.map(b=>new Promise(res=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=()=>res(null);
    img.src=IMG_BASE_URL+b.id+'.'+(b.ext||'jpg');
  })));
  prog.style.width='60%';

  const TX=PAD, TY=HEADER_H+PAD;
  // 計算各欄位 x 起始位置
  const fieldXMap = {};
  let fieldX = TX+60;
  fields.forEach(f=>{ fieldXMap[f.key]=fieldX; fieldX+=(FIELD_WIDTHS[f.key]||DEFAULT_W); });

  ctx.fillStyle='#f0eff9'; ctx.fillRect(TX,TY,W-PAD*2,TH);
  ctx.fillStyle='#3d3d8f'; ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('圖',TX+10,TY+23);
  fields.forEach(f=>ctx.fillText(f.label, fieldXMap[f.key], TY+23));

  list.forEach((b,i)=>{
    const ry=TY+TH+i*ROW_H;
    ctx.fillStyle=i%2===0?'#fff':'#faf9f5'; ctx.fillRect(TX,ry,W-PAD*2,ROW_H);
    ctx.strokeStyle='#ece9e0'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(TX,ry); ctx.lineTo(TX+W-PAD*2,ry); ctx.stroke();
    if(imgs[i]){
      ctx.save();
      ctx.beginPath(); ctx.arc(TX+8+THUMB/2,ry+ROW_H/2,THUMB/2,0,Math.PI*2); ctx.clip();
      ctx.drawImage(imgs[i],TX+8,ry+(ROW_H-THUMB)/2,THUMB,THUMB);
      ctx.restore();
    }
    const c=bandColor(b.band);
    ctx.font='12px "Noto Sans TC",sans-serif'; ctx.textAlign='left';
    fields.forEach(f=>{
      let val=b[f.key]||'—';
      if(f.key==='event') val=b.short_event||getEventShortName(val);
      const fw = FIELD_WIDTHS[f.key]||DEFAULT_W;
      const fx = fieldXMap[f.key];
      if(f.key==='band'){
        ctx.fillStyle=c+'22';
        ctx.beginPath();ctx.roundRect(fx-4,ry+ROW_H/2-10,Math.min(val.length*8+16,fw-8),20,10);ctx.fill();
        ctx.fillStyle=c;
      } else { ctx.fillStyle='#333'; }
      // 依欄位寬度截斷
      const maxChars = Math.floor(fw/8);
      if(val.length>maxChars) val=val.slice(0,maxChars-1)+'…';
      ctx.fillText(val, fx, ry+ROW_H/2+5);
    });
  });

  // 浮水印已在 drawWatermark 處理

  prog.style.width='95%';
  if(exportFmt==='pdf'){
    const {jsPDF}=window.jspdf;
    const imgData=canvas.toDataURL('image/png');
    const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[canvas.width,canvas.height]});
    pdf.addImage(imgData,'PNG',0,0,canvas.width,canvas.height);
    pdf.save(`bandori-badges-${Date.now()}.pdf`);
  } else {
    const mimeType=exportFmt==='jpg'?'image/jpeg':'image/png';
    const ext=exportFmt==='jpg'?'jpg':'png';
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=`bandori-badges-${Date.now()}.${ext}`;
      a.click(); URL.revokeObjectURL(url);
    },mimeType,0.92);
  }
  prog.style.width='100%';
  setTimeout(()=>{if(btn){btn.disabled=false;btn.textContent='⬇ 下載';}if(progWrap){progWrap.style.display='none';}if(prog){prog.style.width='0%';}},600);
}

/* ── HTML 匯出 ── */
function doExportHTML(list, title, btn, progWrap, prog){
  const fields = getExportFields().filter(f=>selectedFields.has(f.key));
  const rows = list.map(b=>{
    const eventVal = b.short_event || getEventShortName(b.event||'');
    const c = bandColor(b.band);
    const imgSrc = IMG_BASE_URL + b.id + '.' + (b.ext||'jpg');
    return `<tr>
      <td><img src="${imgSrc}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;"/></td>
      ${fields.map(f=>{
        let val = b[f.key]||'—';
        if(f.key==='event') val=eventVal;
        if(f.key==='band') return `<td><span style="background:${c}22;color:${c};padding:2px 8px;border-radius:10px;font-size:0.8rem;">${val}</span></td>`;
        return `<td>${val}</td>`;
      }).join('')}
    </tr>`;
  }).join('');

  const htmlContent = `<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"/>
<title>${title}</title>
<style>
  body{font-family:'Noto Sans TC',sans-serif;background:#faf9f5;color:#1a1a1a;padding:2rem;}
  h1{color:#13122b;margin-bottom:1rem;}
  table{border-collapse:collapse;width:100%;}
  th{background:#f0eff9;color:#3d3d8f;padding:10px 12px;text-align:left;font-size:0.8rem;}
  td{padding:8px 12px;border-top:1px solid #ece9e0;vertical-align:middle;}
  tr:hover td{background:#f5f4ff;}
  .footer{margin-top:1rem;font-size:0.75rem;color:#aaa;}
</style></head><body>
<h1>${title}</h1>
<p style="color:#888;font-size:0.85rem;">共 ${list.length} 枚｜匯出時間：${new Date().toLocaleString('zh-TW')}</p>
<table>
  <thead><tr><th>圖片</th>${fields.map(f=>`<th>${f.label}</th>`).join('')}</tr></thead>
  <tbody>${rows}</tbody>
</table>
<div class="footer">作者：千早愛音的暴躁柯基</div>
</body></html>`;

  const blob = new Blob([htmlContent], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bandori-badges-${Date.now()}.html`;
  a.click(); URL.revokeObjectURL(url);
  btn.disabled=false; btn.textContent='⬇ 下載';
  progWrap.style.display='none';
}

/* ── Excel 匯出 ── */
function doExportExcel(list, title, btn, progWrap, prog){
  const fields = getExportFields().filter(f=>selectedFields.has(f.key));
  const headers = ['圖片連結', ...fields.map(f=>f.label)];
  const rows = list.map(b=>{
    const eventVal = b.short_event || getEventShortName(b.event||'');
    const imgUrl = IMG_BASE_URL + b.id + '.' + (b.ext||'jpg');
    return [imgUrl, ...fields.map(f=>{
      if(f.key==='event') return eventVal;
      return b[f.key]||'';
    })];
  });

  // 產生 CSV（Excel 可直接開啟）
  const csvRows = [headers, ...rows].map(row=>
    row.map(val=>'"'+(String(val||'').replace(/"/g,'""'))+'"').join(',')
  ).join('\n');
  const bom = '﻿'; // UTF-8 BOM for Excel
  const blob = new Blob([bom+csvRows], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`bandori-badges-${Date.now()}.csv`;
  a.click(); URL.revokeObjectURL(url);
  btn.disabled=false; btn.textContent='⬇ 下載';
  progWrap.style.display='none';
}
